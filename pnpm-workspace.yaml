packages:
 - 'packages/*'
 - 'apps/*'

# Dependency build-script policy.
# pnpm 11 does NOT read the "pnpm" field from package.json — these settings
# must live here, in pnpm-workspace.yaml. pnpm 11 also FAILS the install
# (ERR_PNPM_IGNORED_BUILDS, the Cloudflare Pages error) if any dependency
# with an install script is left unclassified. Every such dependency must be
# in exactly one of the two lists below.

# Run their install scripts:
#  - prisma stack       -> `prisma generate` + engine download (bot, Server)
#  - canvas/sharp/skia  -> download prebuilt binaries (bot, Service); no source
#                          compile, so they're safe on the Cloudflare image too
#  - esbuild            -> ensures Vite's native binary exists for the web build
onlyBuiltDependencies:
 - '@prisma/client'
 - '@prisma/engines'
 - prisma
 - canvas
 - sharp
 - skia-canvas
 - esbuild

# Acknowledge but DON'T run — each works without its install script because the
# binary ships via an optional platform package or there is a JS fallback:
#  - @swc/core      -> binary from @swc/core-<platform> (bot compiles via swc cli)
#  - cbor-extract   -> optional accelerator for cbor-x, JS fallback
#  - unrs-resolver  -> napi resolver with prebuilt platform packages
#  - workerd        -> only needed for `wrangler dev`/preview, not the build
ignoredBuiltDependencies:
 - '@swc/core'
 - cbor-extract
 - unrs-resolver
 - workerd

overrides:
  prisma: 6.19.1
  '@prisma/client': 6.19.1

# This monorepo is entirely git submodules (incl. the deploy target apps/Website);
# a local checkout can't mirror CI's recursively-checked-out submodule SHAs, so the
# root lockfile inevitably drifts from the submodule package.json set on CI. Don't
# hard-fail the build on that — let pnpm reconcile the lockfile during install.
# (Overrides CI's default of frozen-lockfile=true.)
frozenLockfile: false