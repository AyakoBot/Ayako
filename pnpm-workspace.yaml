packages:
 - 'packages/*'
 - 'apps/*'

# Dependency build-script policy.
# pnpm blocks dependency install scripts by default and aborts a non-interactive
# install with ERR_PNPM_IGNORED_BUILDS (the Cloudflare Pages error) until they're
# allowed. Verified empirically on pnpm 11.6.0: onlyBuiltDependencies /
# ignoredBuiltDependencies do NOT suppress that error in CI — only this does.
# The needed scripts are first-party + mainstream native deps (prisma generate,
# canvas / sharp / skia-canvas, esbuild, …), a trusted set, so allow them all.
dangerouslyAllowAllBuilds: true

# This monorepo is entirely git submodules (incl. the deploy target apps/Website);
# a local checkout can't mirror CI's recursively-checked-out submodule SHAs, so the
# root lockfile inevitably drifts from the submodule package.json set on CI. Don't
# hard-fail the build on that — let pnpm reconcile the lockfile during install.
# (Overrides CI's default of frozen-lockfile=true.)
frozenLockfile: false